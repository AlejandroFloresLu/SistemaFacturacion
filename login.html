<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturador - Acceso al Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script> 
    <style>
        .login-card {
            max-width: 400px;
            width: 100%;
        }
        .error-border {
            border: 2px solid #ef4444 !important;
        }
        /* Transición suave para el foco de los inputs */
        input:focus {
            box-shadow: 0 0 0 4px rgba(11, 65, 130, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 min-vh-100">

    <div class="flex flex-col lg:flex-row min-h-screen">
        
        <div class="hidden lg:flex w-1/2 bg-[#0b4182] flex-col justify-center items-center text-white p-12">
            <div class="mb-6 bg-white/10 p-6 rounded-3xl backdrop-blur-sm">
                <i data-lucide="layers" size="80" class="text-blue-300"></i>
            </div>
            <h1 class="text-5xl font-bold mb-4">Facturador</h1>
            <p class="text-blue-100 text-center text-xl max-w-md font-light leading-relaxed">
                Gestión de facturación inteligente, rápida y segura para potenciar tu negocio.
            </p>
        </div>

        <div class="flex-1 flex align-items-center justify-center p-6 lg:p-12">
            <div class="login-card bg-white p-8 lg:p-10 rounded-3xl shadow-2xl border border-slate-100">
                
                <div class="lg:hidden text-center mb-8">
                    <div class="inline-flex p-3 bg-blue-50 rounded-2xl mb-3">
                        <i data-lucide="layers" size="32" class="text-[#0b4182]"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-[#0b4182]">Facturador</h1>
                </div>

                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-slate-800">Bienvenido</h2>
                    <p class="text-slate-500 mt-2">Ingresa tus credenciales para continuar</p>
                </div>

                <form id="loginForm" class="space-y-6" onsubmit="validarLogin(event)">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Usuario</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                                <i data-lucide="user" size="18"></i>
                            </span>
                            <input type="text" id="usuario" 
                                class="w-full pl-12 pr-4 py-3.5 rounded-xl border border-slate-200 focus:border-blue-500 outline-none transition-all" 
                                placeholder="Ej: admin">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Contraseña</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                                <i data-lucide="lock" size="18"></i>
                            </span>
                            <input type="password" id="password" 
                                class="w-full pl-12 pr-4 py-3.5 rounded-xl border border-slate-200 focus:border-blue-500 outline-none transition-all" 
                                placeholder="••••••••">
                        </div>
                    </div>

                    <div id="errorMessage" class="hidden bg-red-50 text-red-600 text-sm p-4 rounded-xl flex items-start gap-3 border border-red-100">
                        <i data-lucide="alert-circle" size="18" class="mt-0.5"></i>
                        <span id="errorText"></span>
                    </div>

                    <button type="submit" 
                            class="w-full text-white py-4 rounded-xl font-bold shadow-lg flex justify-center items-center gap-2 transition-all hover:opacity-90 active:scale-[0.98]"
                            style="background-color: #0b4182;">
                        Ingresar al sistema 
                        <i data-lucide="arrow-right" size="20"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Inicializar iconos
        lucide.createIcons();

        function validarLogin(event) {
            event.preventDefault();
            
            const userField = document.getElementById('usuario');
            const passField = document.getElementById('password');
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            // Resetear estados
            errorDiv.classList.add('hidden');
            userField.classList.remove('error-border');
            passField.classList.remove('error-border');

            const user = userField.value.trim();
            const pass = passField.value.trim();

            // 1. Validar campos vacíos (IHC: Prevención de errores)
            if (!user) {
                mostrarError("El campo usuario no puede estar vacío", userField);
                return;
            }
            if (!pass) {
                mostrarError("Debes ingresar una contraseña", passField);
                return;
            }

            // 2. Validar credenciales
            if (user === "admin" && pass === "1234") {
                // Éxito
                window.location.href = "index.html";
            } else {
                // Error (IHC: Feedback informativo)
                mostrarError("Usuario o contraseña incorrectos. Verifica tus datos.", null);
                userField.classList.add('error-border');
                passField.classList.add('error-border');
            }
        }

        function mostrarError(mensaje, campo) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            
            errorText.innerText = mensaje;
            errorDiv.classList.remove('hidden');
            
            if (campo) {
                campo.classList.add('error-border');
                campo.focus();
            }
        }
    </script>
</body>
</html>
