<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FACTU - Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css"> 
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="d-lg-none bg-white border-bottom p-3 sticky-top">
        <div class="d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <button class="btn btn-light border me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-label="Abrir menú">
                    <i data-lucide="menu" aria-hidden="true"></i>
                </button>
                <span class="h5 mb-0 fw-bold" style="color: #0b4182;">FACTU</span>
            </div>
        </div>
    </div>

    <div class="offcanvas-lg offcanvas-start sidebar" tabindex="-1" id="sidebarMenu">
        
        <div class="p-4 border-bottom d-flex align-items-center gap-3">
            <div class="text-white p-2 rounded-3" style="background-color: #0b4182;">
                <i data-lucide="calculator" aria-hidden="true"></i>
            </div>
            <span class="h4 mb-0 fw-bold">FACTU</span>
            <button type="button" class="btn-close d-lg-none" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu" aria-label="Cerrar menú"></button>
        </div>

        <div class="offcanvas-body d-flex flex-column p-3 overflow-y-auto">
            
            <div id="section-favoritos" class="mb-4 d-none">
                <p class="text-uppercase text-muted fw-bold mb-2 px-3 small" style="letter-spacing: 1px;">Favoritos</p>
                <div id="favoritos-list" class="nav flex-column gap-1"></div>
                <hr class="mx-3 my-3">
            </div>

            <div class="flex-grow-1" id="navAccordion" role="navigation" aria-label="Menú principal">
                
                <a href="index.html" class="nav-link-custom text-decoration-none d-flex align-items-center px-3 py-2 mb-2 rounded" style="color: var(--text-muted); font-weight: 500; transition: all 0.2s;">
                    <i data-lucide="pie-chart" class="me-2" aria-hidden="true"></i> Dashboard
                </a>

                <a href="factura.html" class="nav-link-custom text-decoration-none d-flex align-items-center px-3 py-2 mb-1 rounded factura-nav-link" style="color: var(--primary-color); font-weight: 600; background-color: #eef2ff; transition: all 0.2s; border: 1px solid #c7d2fe;">
                    <i data-lucide="zap" class="me-2 text-primary" aria-hidden="true"></i> Nueva Factura
                </a>

                <a href="facturas-lista.html" class="nav-link-custom text-decoration-none d-flex align-items-center px-3 py-2 mb-2 rounded border" style="color: var(--text-muted); font-weight: 500; transition: all 0.2s; font-size: 0.95rem; background-color: #f8fafc; margin-left: 10px;">
                    <i data-lucide="list" class="me-2 text-muted" style="width: 18px; height: 18px;" aria-hidden="true"></i> Ver Facturas
                </a>

                <a href="clientes.html" class="nav-link-custom text-decoration-none d-flex align-items-center px-3 py-2 mb-2 rounded" style="color: var(--text-muted); font-weight: 500; transition: all 0.2s;">
                    <i data-lucide="users" class="me-2" aria-hidden="true"></i> Clientes
                </a>

                <a href="productos.html" class="nav-link-custom text-decoration-none d-flex align-items-center px-3 py-2 mb-2 rounded" style="color: var(--text-muted); font-weight: 500; transition: all 0.2s;">
                    <i data-lucide="package" class="me-2" aria-hidden="true"></i> Productos
                </a>

                <a href="carga-masiva.html" class="nav-link-custom text-decoration-none d-flex align-items-center px-3 py-2 mb-2 rounded" style="color: var(--text-muted); font-weight: 500; transition: all 0.2s;">
                    <i data-lucide="upload-cloud" class="me-2" aria-hidden="true"></i> Carga Masiva
                </a>

            </div>

            <div class="mt-auto p-3 bg-light rounded-4 border">
                <div class="d-flex align-items-center gap-3">
                    <div class="avatar-circle" style="background-color: #0b4182;">AF</div>
                    <div>
                        <div class="fw-bold">Admin</div>
                        <div class="text-muted small">Alejandro Flores</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <main class="main-content d-flex align-items-center justify-content-center min-vh-100"" role="main">
        <div class="text-center opacity-25">
            <i data-lucide="calculator" style="width: 120px; height: 120px;" class="text-secondary mb-3" aria-hidden="true"></i>
            <h1 class="display-3 fw-bold text-secondary">FACTU</h1>
            <p class="h5 text-secondary">Bienvenido al sistema contable</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Inicializar iconos de Lucide
        lucide.createIcons();
    </script>
</body>
</html>
